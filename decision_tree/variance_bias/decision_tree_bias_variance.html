<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결정트리의 편향과 분산</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f1efe8;
    --text-primary: #2c2c2a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --accent: #534AB7;
    --radius-md: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #26262380;
      --surface-2: #2c2c2a;
      --text-primary: #e8e6de;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1rem;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", sans-serif;
    line-height: 1.7;
  }
  .container {
    max-width: 780px;
    margin: 0 auto;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 1.5rem;
  }
  .controls label {
    font-size: 14px;
    color: var(--text-secondary);
    min-width: 80px;
  }
  .controls input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--surface-2);
    border-radius: 2px;
    outline: none;
  }
  .controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .controls input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .depth-out {
    font-size: 14px;
    font-weight: 500;
    min-width: 20px;
    text-align: right;
    color: var(--text-primary);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }
  .panel {
    background: var(--surface-2);
    border-radius: var(--radius-md);
    padding: 10px;
  }
  canvas {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: block;
    border-radius: var(--radius-md);
    background: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    canvas { background: #0f0f0d; }
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .controls label { min-width: auto; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="controls">
    <label>Tree depth</label>
    <input type="range" min="1" max="12" value="3" step="1" id="depth">
    <span class="depth-out" id="depth-out">3</span>
  </div>

  <div class="grid">
    <div class="panel">
      <canvas id="c0" width="260" height="260"></canvas>
    </div>
    <div class="panel">
      <canvas id="c1" width="260" height="260"></canvas>
    </div>
    <div class="panel">
      <canvas id="c2" width="260" height="260"></canvas>
    </div>
  </div>
</div>

<script>
(function() {
  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = a;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function trueLabel(x, y) {
    var d = Math.sqrt((x - 0.5) * (x - 0.5) + (y - 0.5) * (y - 0.5));
    return d < 0.28 ? 0 : 1;
  }

  function makeSample(seed, n) {
    var rnd = mulberry32(seed);
    var pts = [];
    for (var i = 0; i < n; i++) {
      var x = rnd(), y = rnd();
      var label = trueLabel(x, y);
      if (rnd() < 0.12) label = 1 - label;
      pts.push({ x: x, y: y, label: label });
    }
    return pts;
  }

  function gini(points) {
    if (points.length === 0) return 0;
    var c0 = 0;
    for (var i = 0; i < points.length; i++) if (points[i].label === 0) c0++;
    var p0 = c0 / points.length, p1 = 1 - p0;
    return 1 - p0 * p0 - p1 * p1;
  }

  function majority(points) {
    var c0 = 0;
    for (var i = 0; i < points.length; i++) if (points[i].label === 0) c0++;
    return c0 >= points.length - c0 ? 0 : 1;
  }

  function bestSplit(points) {
    if (points.length < 4) return null;
    var best = null;
    var baseGini = gini(points);
    var n = points.length;
    for (var axis = 0; axis < 2; axis++) {
      var sorted = points.slice().sort(function(a, b) {
        return (axis === 0 ? a.x - b.x : a.y - b.y);
      });
      for (var i = 1; i < n; i++) {
        var v = axis === 0 ? sorted[i].x : sorted[i].y;
        var prev = axis === 0 ? sorted[i - 1].x : sorted[i - 1].y;
        if (v === prev) continue;
        var threshold = (v + prev) / 2;
        var left = sorted.slice(0, i), right = sorted.slice(i);
        var gain = baseGini - (left.length / n) * gini(left) - (right.length / n) * gini(right);
        if (!best || gain > best.gain) {
          best = { axis: axis, threshold: threshold, gain: gain, left: left, right: right };
        }
      }
    }
    return (best && best.gain > 0.001) ? best : null;
  }

  function buildTree(points, depth, maxDepth) {
    if (depth >= maxDepth || points.length < 4 || gini(points) < 0.05) {
      return { leaf: true, label: majority(points) };
    }
    var split = bestSplit(points);
    if (!split) return { leaf: true, label: majority(points) };
    return {
      leaf: false,
      axis: split.axis,
      threshold: split.threshold,
      left: buildTree(split.left, depth + 1, maxDepth),
      right: buildTree(split.right, depth + 1, maxDepth)
    };
  }

  function predict(tree, x, y) {
    while (!tree.leaf) {
      var v = tree.axis === 0 ? x : y;
      tree = v < tree.threshold ? tree.left : tree.right;
    }
    return tree.label;
  }

  var SAMPLE_SEEDS = [101, 202, 303];
  var N = 120;
  var samples = SAMPLE_SEEDS.map(function(s) { return makeSample(s, N); });

  var GRID = 60;
  var gridCoords = [];
  for (var i = 0; i < GRID; i++) {
    for (var j = 0; j < GRID; j++) {
      gridCoords.push({ x: (i + 0.5) / GRID, y: (j + 0.5) / GRID, i: i, j: j });
    }
  }

  function render(depth) {
    for (var s = 0; s < 3; s++) {
      var tree = buildTree(samples[s], 0, depth);
      var canvas = document.getElementById('c' + s);
      var ctx = canvas.getContext('2d');
      var W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      var cellW = W / GRID, cellH = H / GRID;
      for (var k = 0; k < gridCoords.length; k++) {
        var p = gridCoords[k];
        var pred = predict(tree, p.x, p.y);
        ctx.fillStyle = pred === 0 ? 'rgba(55, 138, 221, 0.22)' : 'rgba(216, 90, 48, 0.22)';
        ctx.fillRect(p.i * cellW, (GRID - 1 - p.j) * cellH, Math.ceil(cellW) + 0.5, Math.ceil(cellH) + 0.5);
      }

      var pts = samples[s];
      for (var m = 0; m < pts.length; m++) {
        var px = pts[m].x * W, py = (1 - pts[m].y) * H;
        ctx.beginPath();
        ctx.arc(px, py, 2.4, 0, Math.PI * 2);
        ctx.fillStyle = pts[m].label === 0 ? '#185FA5' : '#993C1D';
        ctx.fill();
      }
    }
  }

  var slider = document.getElementById('depth');
  var out = document.getElementById('depth-out');
  slider.addEventListener('input', function() {
    out.textContent = slider.value;
    render(parseInt(slider.value, 10));
  });
  render(parseInt(slider.value, 10));
})();
</script>
</body>
</html>
